name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.YUTIANQ_DH_USERNAME }}
          password: ${{ secrets.YUTIANQ_DH_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            yutianqin/scidx-rexec-broker:${{ steps.version.outputs.VERSION }}
            yutianqin/scidx-rexec-broker:latest
